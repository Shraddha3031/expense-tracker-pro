<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Expense Tracker Pro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <h1>Expense Tracker Pro</h1>
      <p>Reset your password and return to your dashboard quickly.</p>
    </div>

    <div class="auth-card">
      <h2>Reset Password</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert {{ category }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" class="auth-form">
        <input type="text" name="username" placeholder="Username" required>

        <div class="password-wrapper">
          <input type="password" id="newPassword" name="new_password" placeholder="New Password" required>
          <button type="button" class="toggle-btn" onclick="togglePassword('newPassword', this)">Show</button>
        </div>

        <div class="password-wrapper">
          <input type="password" id="resetConfirmPassword" name="confirm_password" placeholder="Confirm Password" required>
          <button type="button" class="toggle-btn" onclick="togglePassword('resetConfirmPassword', this)">Show</button>
        </div>

        <button type="submit" class="primary-btn">Reset Password</button>
      </form>

      <p class="auth-text"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
      } else {
        input.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
